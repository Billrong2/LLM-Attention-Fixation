<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="530" viewBox="0 0 1200 530" role="img" aria-labelledby="title desc">
  <title id="title">Four paired CodeSteer output-prediction cases</title>
  <desc id="desc">For four obfuscated Java cases, the unsteered generation is not exact and the paired CodeSteer generation matches the expected output.</desc>
  <rect width="1200" height="530" rx="24" fill="#0b1020"/>
  <text x="48" y="55" fill="#eef2ff" font-family="system-ui, sans-serif" font-size="30" font-weight="700">Paired output comparison</text>
  <text x="48" y="84" fill="#aab4d0" font-family="system-ui, sans-serif" font-size="15">Same model · same obfuscated source · same prompt · same trial · same seed</text>
  <text x="48" y="126" fill="#aab4d0" font-family="system-ui, sans-serif" font-size="13" font-weight="700">CASE</text>
  <text x="455" y="126" fill="#aab4d0" font-family="system-ui, sans-serif" font-size="13" font-weight="700">EXPECTED</text>
  <text x="665" y="126" fill="#ff9b93" font-family="system-ui, sans-serif" font-size="13" font-weight="700">WITHOUT STEERING</text>
  <text x="965" y="126" fill="#6be6a6" font-family="system-ui, sans-serif" font-size="13" font-weight="700">CODESTEER</text>

  <g font-family="system-ui, sans-serif">
    <rect x="32" y="145" width="1136" height="76" rx="13" fill="#151c31" stroke="#2a3554"/>
    <text x="54" y="177" fill="#eef2ff" font-size="18" font-weight="650">Backspace</text>
    <text x="54" y="201" fill="#aab4d0" font-size="13">Codeforces 1553-D</text>
    <text x="455" y="190" fill="#eef2ff" font-family="monospace" font-size="18">NO</text>
    <rect x="650" y="162" width="245" height="42" rx="10" fill="#361d22" stroke="#84423f"/>
    <text x="670" y="188" fill="#ff9b93" font-size="15">No valid final JSON</text>
    <rect x="950" y="162" width="185" height="42" rx="10" fill="#123126" stroke="#267e59"/>
    <text x="970" y="188" fill="#6be6a6" font-family="monospace" font-size="17">NO  ✓</text>

    <rect x="32" y="232" width="1136" height="76" rx="13" fill="#151c31" stroke="#2a3554"/>
    <text x="54" y="264" fill="#eef2ff" font-size="18" font-weight="650">Make a Power of Two</text>
    <text x="54" y="288" fill="#aab4d0" font-size="13">Codeforces 1560-D</text>
    <text x="455" y="277" fill="#eef2ff" font-family="monospace" font-size="17">0 / 0 / 0</text>
    <rect x="650" y="249" width="245" height="42" rx="10" fill="#361d22" stroke="#84423f"/>
    <text x="670" y="275" fill="#ff9b93" font-family="monospace" font-size="16">0 / 0 / 0 / 0</text>
    <rect x="950" y="249" width="185" height="42" rx="10" fill="#123126" stroke="#267e59"/>
    <text x="970" y="275" fill="#6be6a6" font-family="monospace" font-size="16">0 / 0 / 0  ✓</text>

    <rect x="32" y="319" width="1136" height="76" rx="13" fill="#151c31" stroke="#2a3554"/>
    <text x="54" y="351" fill="#eef2ff" font-size="18" font-weight="650">Scenes From a Memory</text>
    <text x="54" y="375" fill="#aab4d0" font-size="13">Codeforces 1562-B</text>
    <text x="455" y="364" fill="#eef2ff" font-family="monospace" font-size="17">1 / 1</text>
    <rect x="650" y="336" width="245" height="42" rx="10" fill="#361d22" stroke="#84423f"/>
    <text x="670" y="362" fill="#ff9b93" font-family="monospace" font-size="17">11</text>
    <rect x="950" y="336" width="185" height="42" rx="10" fill="#123126" stroke="#267e59"/>
    <text x="970" y="362" fill="#6be6a6" font-family="monospace" font-size="17">1 / 1  ✓</text>

    <rect x="32" y="406" width="1136" height="76" rx="13" fill="#151c31" stroke="#2a3554"/>
    <text x="54" y="438" fill="#eef2ff" font-size="18" font-weight="650">Inconvenient Pairs</text>
    <text x="54" y="462" fill="#aab4d0" font-size="13">Codeforces 1569-D</text>
    <text x="455" y="451" fill="#eef2ff" font-family="monospace" font-size="18">0</text>
    <rect x="650" y="423" width="245" height="42" rx="10" fill="#361d22" stroke="#84423f"/>
    <text x="670" y="449" fill="#ff9b93" font-size="15">No valid final JSON</text>
    <rect x="950" y="423" width="185" height="42" rx="10" fill="#123126" stroke="#267e59"/>
    <text x="970" y="449" fill="#6be6a6" font-family="monospace" font-size="17">0  ✓</text>
  </g>
  <text x="48" y="511" fill="#7f8aa8" font-family="system-ui, sans-serif" font-size="12">Illustrative selected trials; not an aggregate accuracy estimate.</text>
</svg>
